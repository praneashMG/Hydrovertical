<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no">
    <title>HydroVertical | Premium Vertical Hydroponic Systems</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <!-- Google Fonts & Font Awesome -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== GLOBAL RESET & VARIABLES (Same as Login Page) ========== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --g1: #0a1f0a;
            --g2: #143d14;
            --g3: #1b5e20;
            --accent: #2e7d32;
            --accent2: #8bc48b;
            --lime: #c8e6c8;
            --text: #0d1f13;
            --text-muted: #4a6a52;
            --bg: #f3f8f4;
            --surface: #ffffff;
            --border: rgba(0, 0, 0, 0.07);
            --radius: 20px;
            --radius-lg: 32px;
            --shadow: 0 8px 32px rgba(11, 46, 26, 0.1);
            --shadow-lg: 0 24px 60px rgba(11, 46, 26, 0.16);
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body.dark {
            --text: #e8f0e8;
            --text-muted: #a4c4a4;
            --bg: #0a1a0a;

            --surface: #112814;
            --border: rgba(255, 255, 255, 0.07);
            --glass: rgba(255, 255, 255, 0.03);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        /* Background decorative elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(86, 194, 122, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 80% 20%, rgba(200, 240, 74, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* ========== UTILITY CLASSES ========== */
        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        /* ========== THEME TOGGLE BUTTONS (External Controls) ========== */
        .theme-controls {
            position: fixed;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .control-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: var(--shadow-lg);
        }

        body[dir="rtl"] .theme-controls {
            right: auto;
            left: 24px;
        }

        /* ========== REGISTER CARD ========== */
        .register-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 36px 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .register-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--g2), var(--g3));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .logo-icon i {
            font-size: 2.2rem;
            color: var(--lime);
        }

        .register-header h1 {
            font-family: 'Inter', sans-serif;
            letter-spacing: -1px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--g1), var(--g3));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        body.dark .register-header h1 {
            background: linear-gradient(135deg, var(--accent2), var(--lime));
            -webkit-background-clip: text;
            background-clip: text;
        }

        .register-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ========== FORM STYLES ========== */
        .form-row {
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .input-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--text);
            text-align: left;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            transition: var(--transition);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(86, 194, 122, 0.15);
        }

        .input-wrapper i {
            color: var(--accent);
            margin-right: 12px;
            font-size: 1rem;
            width: 20px;
            text-align: center;
            display: inline-block;
        }

        .input-wrapper input,
        .input-wrapper select {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
        }


        .input-wrapper select {
            cursor: pointer;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .password-toggle {
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .password-toggle:hover {
            color: var(--accent);
        }

        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
            text-align: left;
        }

        .terms-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .terms-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .terms-group a {
            color: var(--accent);
            text-decoration: none;
        }

        .terms-group a:hover {
            color: var(--lime);
            text-decoration: underline;
        }

        .register-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--g2), var(--g3));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(31, 107, 62, 0.3);
            background: linear-gradient(135deg, var(--g3), var(--accent));
        }

        /* ========== DIVIDER ========== */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider span {
            padding: 0 12px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* ========== SOCIAL REGISTER ========== */
        .social-register {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text);
            text-decoration: none;
        }

        .social-btn i {
            font-size: 1rem;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .social-btn.facebook i {
            color: #1877f2;
        }

        .social-btn.google i {
            color: #db4437;
        }

        .social-btn.apple i {
            color: var(--text);
        }

        /* ========== LOGIN SECTION ========== */
        .login-section {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .login-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .login-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .login-link:hover {
            color: var(--lime);
            gap: 10px;
        }

        /* ========== RTL SUPPORT ========== */
        body[dir="rtl"] {
            direction: rtl;
        }

        body[dir="rtl"] .input-wrapper i {
            margin-right: 0;
            margin-left: 12px;
        }

        body[dir="rtl"] .theme-controls {
            right: auto;
            left: 24px;
        }

        body[dir="rtl"] .social-btn {
            flex-direction: row-reverse;
        }

        body[dir="rtl"] .login-link i {
            transform: rotate(180deg);
        }

        body[dir="rtl"] .form-row {
            direction: rtl;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 550px) {
            body {
                padding: 16px;
            }

            .register-card {
                padding: 24px 20px;
            }

            .register-header {
                margin-bottom: 20px;
            }

            .logo-icon {
                width: 55px;
                height: 55px;
            }

            .logo-icon i {
                font-size: 1.8rem;
            }

            .register-header h1 {
                font-size: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .form-group {
                margin-bottom: 14px;
            }

            .input-wrapper {
                padding: 10px 14px;
            }

            .social-register {
                flex-direction: column;
                gap: 10px;
            }

            .theme-controls {
                top: 16px;
                right: 16px;
            }

            body[dir="rtl"] .theme-controls {
                right: auto;
                left: 16px;
            }

            .control-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
        }

        @media (max-width: 380px) {
            .register-card {
                padding: 20px 16px;
            }

            .register-header h1 {
                font-size: 1.3rem;
            }
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        /* ========== MOBILE & TABLET RESPONSIVE FIXES ONLY ========== */

        /* Tablet Portrait (768px - 1024px) */
        @media (min-width: 768px) and (max-width: 1024px) {
            body {
                padding: 20px;
            }

            .register-card {
                padding: 32px 36px;
            }

            .register-header {
                margin-bottom: 24px;
            }

            .register-header h1 {
                font-size: 1.7rem;
            }

            .logo-icon {
                width: 60px;
                height: 60px;
            }

            .logo-icon i {
                font-size: 2rem;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .form-row {
                gap: 14px;
            }

            .theme-controls {
                top: 20px;
                right: 20px;
            }

            .control-btn {
                width: 42px;
                height: 42px;
            }

            .social-register {
                gap: 10px;
            }

            .register-btn {
                padding: 12px;
            }
        }

        /* Tablet Landscape (1025px - 1280px) */
        @media (min-width: 1025px) and (max-width: 1280px) {
            body {
                padding: 20px;
            }

            .register-card {
                padding: 34px 38px;
            }

            .theme-controls {
                top: 20px;
                right: 20px;
            }

            body[dir="rtl"] .theme-controls {
                right: auto;
                left: 20px;
            }
        }

        /* Mobile Large (426px - 767px) */
        @media (min-width: 426px) and (max-width: 767px) {
            body {
                padding: 16px;
            }

            .register-card {
                padding: 28px 24px;
            }

            .register-header {
                margin-bottom: 22px;
            }

            .register-header h1 {
                font-size: 1.6rem;
            }

            .register-header p {
                font-size: 0.8rem;
            }

            .logo-icon {
                width: 55px;
                height: 55px;
                margin-bottom: 14px;
            }

            .logo-icon i {
                font-size: 1.8rem;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .input-label {
                font-size: 0.75rem;
            }

            .input-wrapper {
                padding: 10px 14px;
            }

            .input-wrapper i {
                font-size: 0.9rem;
            }

            .input-wrapper input,
            .input-wrapper select {
                font-size: 0.85rem;
            }

            .register-btn {
                padding: 11px;
                font-size: 0.9rem;
            }

            .divider {
                margin: 20px 0;
            }

            .social-btn {
                padding: 9px;
                font-size: 0.8rem;
            }

            .login-text {
                font-size: 0.8rem;
            }

            .theme-controls {
                top: 16px;
                right: 16px;
                gap: 10px;
            }

            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }

        /* Mobile Medium (376px - 425px) */
        @media (min-width: 376px) and (max-width: 425px) {
            body {
                padding: 16px;
            }

            .register-card {
                padding: 24px 20px;
            }

            .register-header {
                margin-bottom: 20px;
            }

            .register-header h1 {
                font-size: 1.5rem;
            }

            .register-header p {
                font-size: 0.8rem;
            }

            .logo-icon {
                width: 55px;
                height: 55px;
                margin-bottom: 12px;
            }

            .logo-icon i {
                font-size: 1.8rem;
            }

            .form-group {
                margin-bottom: 14px;
            }

            .input-label {
                font-size: 0.75rem;
                margin-bottom: 5px;
            }

            .input-wrapper {
                padding: 10px 14px;
            }

            .input-wrapper i {
                font-size: 0.9rem;
                justify-self: center;
            }

            .input-wrapper input,
            .input-wrapper select {
                font-size: 0.85rem;
            }

            .form-options {
                margin-bottom: 20px;
            }

            .register-btn {
                padding: 11px;
                font-size: 0.9rem;
            }

            .divider {
                margin: 18px 0;
            }

            .social-register {
                gap: 10px;
                margin-bottom: 20px;
            }

            .social-btn {
                padding: 9px;
                font-size: 0.8rem;
            }

            .login-section {
                padding-top: 18px;
            }

            .theme-controls {
                top: 16px;
                right: 16px;
                gap: 8px;
            }

            .control-btn {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }

            body[dir="rtl"] .theme-controls {
                right: auto;
                left: 16px;
            }
        }

        /* Mobile Small (321px - 375px) */
        @media (min-width: 321px) and (max-width: 375px) {
            body {
                padding: 14px;
            }

            .register-card {
                padding: 22px 18px;
            }

            .register-header {
                margin-bottom: 18px;
            }

            .register-header h1 {
                font-size: 1.4rem;
            }

            .register-header p {
                font-size: 0.75rem;
            }

            .logo-icon {
                width: 50px;
                height: 50px;
                margin-bottom: 12px;
            }

            .logo-icon i {
                font-size: 1.6rem;
            }

            .form-group {
                margin-bottom: 14px;
            }

            .input-label {
                font-size: 0.7rem;
                margin-bottom: 5px;
            }

            .input-wrapper {
                padding: 9px 12px;
            }

            .input-wrapper i {
                font-size: 0.85rem;
                margin-right: 10px;

            }

            .input-wrapper input,
            .input-wrapper select {
                font-size: 0.8rem;
            }

            .register-btn {
                padding: 10px;
                font-size: 0.85rem;
            }

            .divider {
                margin: 16px 0;
            }

            .divider span {
                font-size: 0.75rem;
                padding: 0 10px;
            }

            .social-register {
                gap: 8px;
                margin-bottom: 18px;
            }

            .social-btn {
                padding: 8px;
                font-size: 0.75rem;
            }

            .social-btn i {
                font-size: 0.9rem;
            }

            .login-text {
                font-size: 0.75rem;
                margin-bottom: 6px;
            }

            .login-link {
                font-size: 0.8rem;
            }

            .terms-group {
                margin: 16px 0;
                gap: 8px;
            }

            .terms-group input {
                width: 16px;
                height: 16px;
            }

            .terms-group label {
                font-size: 0.7rem;
            }

            .theme-controls {
                top: 14px;
                right: 14px;
                gap: 8px;
            }

            .control-btn {
                width: 36px;
                height: 36px;
                font-size: 0.85rem;
            }

            body[dir="rtl"] .theme-controls {
                right: auto;
                left: 14px;
            }
        }

        /* Mobile Extra Small (280px - 320px) */
        @media (max-width: 320px) {
            body {
                padding: 12px;
            }

            .register-card {
                padding: 20px 16px;
            }

            .register-header {
                margin-bottom: 16px;
            }

            .register-header h1 {
                font-size: 1.3rem;
            }

            .register-header p {
                font-size: 0.7rem;
            }

            .logo-icon {
                width: 45px;

            }

            .logo-icon i {

            }

            .form-group {
                margin-bottom: 12px;
            }

            .input-label {
                font-size: 0.65rem;
                margin-bottom: 4px;
            }

            .input-wrapper {
                padding: 8px 12px;
            }

            .input-wrapper i {
                font-size: 0.8rem;
                margin-right: 8px;
            }

            .input-wrapper input,
            .input-wrapper select {
                font-size: 0.75rem;
            }

            .register-btn {
                padding: 9px;
                font-size: 0.8rem;
            }

            .divider {
                margin: 14px 0;
            }

            .divider span {
                font-size: 0.7rem;
                padding: 0 8px;
            }

            .social-register {
                gap: 8px;
                margin-bottom: 16px;
                flex-direction: column;
            }

            .social-btn {
                padding: 8px;
                font-size: 0.7rem;
                justify-content: center;
            }

            .login-section {
                padding-top: 16px;
            }

            .login-text {
                font-size: 0.7rem;
            }

            .login-link {
                font-size: 0.75rem;
            }

            .terms-group {
                margin: 14px 0;
                gap: 6px;
            }

            .terms-group label {
                font-size: 0.65rem;
            }

            .theme-controls {
                top: 12px;
                right: 12px;
                gap: 6px;
            }

            .control-btn {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }

            body[dir="rtl"] .theme-controls {
                right: auto;
                left: 12px;
            }
        }

        /* Landscape orientation for mobile devices */
        @media (max-width: 900px) and (orientation: landscape) {
            body {
                padding: 12px;
                min-height: auto;
            }

            .register-card {
                padding: 16px 24px;
            }

            .register-header {
                margin-bottom: 12px;
            }

            .register-header h1 {
                font-size: 1.3rem;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                margin-bottom: 8px;
            }

            .logo-icon i {
                font-size: 1.3rem;
            }

            .form-group {
                margin-bottom: 10px;
            }

            .input-wrapper {
                padding: 6px 10px;
            }

            .form-row {
                gap: 10px;
            }

            .social-register {
                flex-direction: row;
                gap: 8px;
                margin-bottom: 14px;
            }

            .social-btn {
                padding: 6px;
                font-size: 0.7rem;
            }

            .divider {
                margin: 12px 0;
            }

            .login-section {
                padding-top: 12px;
            }

            .terms-group {
                margin: 12px 0;
            }

            .theme-controls {
                top: 10px;
                right: 10px;
            }

            .control-btn {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
        }

        /* Prevent any horizontal scroll on mobile/tablet */
        @media (max-width: 1024px) {

            html,
            body {
                overflow-x: hidden;
                width: 100%;
                position: relative;
            }

            .container,
            .register-card,
            .theme-controls {
                max-width: 100%;
            }
        }

        /* Improve touch targets for mobile/tablet */
        @media (max-width: 1024px) {

            .register-btn,
            .social-btn,
            .control-btn,
            .login-link,
            .password-toggle,
            .terms-group input,
            .terms-group label {
                cursor: pointer;
                min-height: 25px;
            }

            .terms-group {
                min-height: 44px;
            }

            /* Prevent zoom on input focus for iOS */
            .input-wrapper input,
            .input-wrapper select {
                font-size: 16px;
            }
        }

        /* Fix for RTL mode on mobile/tablet */
        @media (max-width: 1024px) {
            body[dir="rtl"] .social-btn {
                flex-direction: row-reverse;
            }

            body[dir="rtl"] .input-wrapper i {
                margin-right: 0;
                margin-left: 8px;
            }

            body[dir="rtl"] .form-row {
                gap: 10px;
            }
        }

        /* Toast notification responsiveness for mobile/tablet */
        @media (max-width: 768px) {
            .toast-notification {
                width: calc(100% - 32px);
                max-width: 350px;
                white-space: normal;
                text-align: center;
                line-height: 1.4;
                padding: 10px 16px;
                font-size: 0.8rem;
                bottom: 16px;
            }
        }

        /* Fix for terms group alignment on mobile */
        @media (max-width: 550px) {
            .terms-group {
                align-items: flex-start;
            }

            .terms-group input {
                margin-top: 2px;
            }
        }

        /* Ensure proper scrolling on small devices */
        @media (max-height: 700px) and (max-width: 480px) {
            body {
                min-height: auto;
                padding: 12px;
            }

            .register-card {
                margin: 10px 0;
            }
        }

        /* Fix for select dropdown on mobile */
        @media (max-width: 768px) {
            .input-wrapper select {
                width: 100%;
            }
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: #4ade80 !important; /* Premium Emerald for "Hydro" */
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
            text-decoration: none;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }
        .logo i {
            font-size: 1.5rem;
            color: #4ade80 !important; /* Premium Emerald for Icon */
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }
        .logo span {
            color: #4ade80 !important; /* Premium Emerald for "Vertical" */
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }
        
    </style>
</head>

<body>
    <!-- External Controls (Dark Mode & RTL Toggle) -->
    <div class="theme-controls">
        <button class="control-btn" id="darkModeToggle" title="Toggle Dark/Light Mode">
            <i class="fas fa-moon"></i>
        </button>
        <button class="control-btn" id="rtlToggle" title="Toggle RTL Layout">
            <i class="fas fa-exchange-alt"></i>
        </button>
    </div>

    <!-- Register Container -->
    <div class="container">
        <div class="register-card">
            <div class="register-header">
                <div id="logo">
                    <a href="./index.html" class="logo" style="justify-content: center; padding: 10px ;"><i class="fas fa-leaf"></i> Hydro<span>Vertical</span></a>
                </div>
                <h1>Create Account</h1>
                <p>Join the vertical farming revolution</p>
            </div>

            <!-- Registration Form -->
            <form id="registerForm">
                <div class="form-group">
                    <label class="input-label">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="input-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="farmer@hydronex.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="input-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Create password" required>
                            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="input-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                            <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="input-label">Account Type</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building"></i>
                        <select id="accountType">
                            <option value="farmer">🌱 Farmer / Grower</option>
                            <option value="supplier">📦 Supplier / Partner</option>
                            <option value="researcher">🔬 Researcher / Educator</option>
                            <option value="investor">💰 Investor</option>
                        </select>
                    </div>
                </div>

                <div class="terms-group">
                    <input type="checkbox" id="termsCheckbox" required>
                    <label>
                        I agree to the <a href="#" id="termsLink">Terms of Service</a> and
                        <a href="#" id="privacyLink">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <!-- Login Section -->
            <div class="login-section">
                <p class="login-text">Already have an account?</p>
                <a href="./login.html" class="login-link" id="loginLink">
                    Sign In <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // ========== DARK MODE TOGGLE ==========
            const darkModeToggle = document.getElementById('darkModeToggle');
            const savedTheme = localStorage.getItem('theme');

            const darkModeStyle = document.createElement('style');
            darkModeStyle.id = 'register-dark-styles';
            darkModeStyle.textContent = `
                body.dark .register-card {
                    background: var(--surface);
                }
                body.dark .social-btn {
                    background: var(--bg);
                }
                body.dark .social-btn:hover {
                    background: var(--surface);
                }
                body.dark .control-btn {
                    background: var(--surface);
                }
            `;

            function enableDarkMode() {
                document.body.classList.add('dark');
                if (!document.getElementById('register-dark-styles')) {
                    document.head.appendChild(darkModeStyle);
                }
                const icon = darkModeToggle.querySelector('i');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            }

            function disableDarkMode() {
                document.body.classList.remove('dark');
                const styleEl = document.getElementById('register-dark-styles');
                if (styleEl) styleEl.remove();
                const icon = darkModeToggle.querySelector('i');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }

            function toggleDarkMode() {
                if (document.body.classList.contains('dark')) {
                    disableDarkMode();
                } else {
                    enableDarkMode();
                }
            }

            if (savedTheme === 'dark') {
                enableDarkMode();
            } else if (savedTheme === 'light') {
                disableDarkMode();
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                enableDarkMode();
            }

            darkModeToggle.addEventListener('click', toggleDarkMode);

            // ========== RTL TOGGLE ==========
            const rtlToggle = document.getElementById('rtlToggle');
            const savedDir = localStorage.getItem('dir');

            function toggleRTL() {
                const currentDir = document.body.getAttribute('dir');
                if (currentDir === 'rtl') {
                    document.body.removeAttribute('dir');
                    localStorage.setItem('dir', 'ltr');
                } else {
                    document.body.setAttribute('dir', 'rtl');
                    localStorage.setItem('dir', 'rtl');
                }
            }

            if (savedDir === 'rtl') {
                document.body.setAttribute('dir', 'rtl');
            }

            rtlToggle.addEventListener('click', toggleRTL);

            // ========== PASSWORD VISIBILITY TOGGLE ==========
            const togglePassword = document.getElementById('togglePassword');
            const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');

            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            toggleConfirmPassword.addEventListener('click', function () {
                const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                confirmPasswordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            // ========== TOAST NOTIFICATION ==========
            function showToast(message, type = 'info') {
                const existingToast = document.querySelector('.toast-notification');
                if (existingToast) existingToast.remove();

                const toast = document.createElement('div');
                toast.className = 'toast-notification';
                toast.innerHTML = `
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                    <span>${message}</span>
                `;

                toast.style.cssText = `
                    position: fixed;
                    bottom: 24px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: ${type === 'success' ? '#2e7d32' : type === 'error' ? '#c62828' : '#174d2e'};
                    color: white;
                    padding: 12px 24px;
                    border-radius: 50px;
                    font-size: 0.85rem;
                    font-weight: 500;
                    z-index: 1000;
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
                    animation: slideUp 0.3s ease;
                    font-family: 'Inter', sans-serif;
                `;

                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideUp {
                    from {
                        opacity: 0;
                        transform: translateX(-50%) translateY(20px);
                    }
                    to {
                        opacity: 1;
                        transform: translateX(-50%) translateY(0);
                    }
                }
            `;
            document.head.appendChild(style);

            // ========== FORM SUBMISSION ==========
            const registerForm = document.getElementById('registerForm');
            const fullName = document.getElementById('fullName');
            const emailInput = document.getElementById('email');
            const termsCheckbox = document.getElementById('termsCheckbox');

            registerForm.addEventListener('submit', function (e) {
                e.preventDefault();

                const fullNameVal = fullName.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (!fullNameVal) {
                    showToast('Please enter your full name', 'error');
                    return;
                }
                if (!email) {
                    showToast('Please enter your email address', 'error');
                    return;
                }
                if (!email.includes('@')) {
                    showToast('Please enter a valid email address', 'error');
                    return;
                }
                if (!password) {
                    showToast('Please create a password', 'error');
                    return;
                }
                if (password.length < 6) {
                    showToast('Password must be at least 6 characters', 'error');
                    return;
                }
                if (password !== confirmPassword) {
                    showToast('Passwords do not match', 'error');
                    return;
                }
                if (!termsCheckbox.checked) {
                    showToast('Please agree to the Terms of Service', 'error');
                    return;
                }

                // Save user data to localStorage
                const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
                const userExists = users.some(u => u.email === email);

                if (userExists) {
                    showToast('Email already registered. Please login instead.', 'error');
                    return;
                }

                users.push({
                    fullName: fullNameVal,
                    email: email,
                    password: password,
                    accountType: document.getElementById('accountType').value,
                    registeredDate: new Date().toISOString()
                });
                localStorage.setItem('registeredUsers', JSON.stringify(users));

                showToast(`Welcome ${fullNameVal}! Account created successfully. Redirecting to login...`, 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            });

            // ========== SOCIAL REGISTER HANDLERS ==========
            document.getElementById('facebookRegister').addEventListener('click', () => showToast('Facebook sign up - Demo feature', 'info'));
            document.getElementById('googleRegister').addEventListener('click', () => showToast('Google sign up - Demo feature', 'info'));
            document.getElementById('appleRegister').addEventListener('click', () => showToast('Apple sign up - Demo feature', 'info'));

            // ========== LOGIN LINK ==========
            document.getElementById('loginLink').addEventListener('click', function (e) {
                e.preventDefault();
                showToast('Redirecting to login page...', 'info');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 800);
            });

            // ========== TERMS & PRIVACY LINKS ==========
            document.getElementById('termsLink').addEventListener('click', function (e) {
                e.preventDefault();
                showToast('Terms of Service - Demo feature', 'info');
            });

            document.getElementById('privacyLink').addEventListener('click', function (e) {
                e.preventDefault();
                showToast('Privacy Policy - Demo feature', 'info');
            });

            // ========== ENTER KEY NAVIGATION ==========
            const inputs = ['fullName', 'email', 'password', 'confirmPassword'];
            inputs.forEach((id, index) => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('keypress', function (e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            const nextInput = document.getElementById(inputs[index + 1]);
                            if (nextInput) {
                                nextInput.focus();
                            } else {
                                registerForm.dispatchEvent(new Event('submit'));
                            }
                        }
                    });
                }
            });
        })();
    </script>
</body>

</html>
